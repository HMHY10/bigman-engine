name: Agent Job

on:
  create:

jobs:
  run-agent:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    if: github.ref_type == 'branch' && startsWith(github.ref_name, 'job/')
    permissions:
      contents: write
      packages: read

    steps:
      - name: Extract job ID
        id: job
        run: |
          JOB_ID="${{ github.ref_name }}"
          echo "id=${JOB_ID#job/}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout: |
            package-lock.json
            logs/*/job.config.json
          sparse-checkout-cone-mode: false

      - name: Get thepopebot version
        id: version
        run: |
          if [ -f package-lock.json ]; then
            VERSION=$(jq -r '.packages["node_modules/thepopebot"].version // empty' package-lock.json)
          fi
          VERSION="${VERSION:-${{ vars.THEPOPEBOT_VERSION || '1.2.74-beta.30' }}}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Read job config overrides
        id: job-config
        run: |
          CONFIG_FILE="logs/${{ steps.job.outputs.id }}/job.config.json"
          if [ -f "$CONFIG_FILE" ]; then
            echo "llm_provider=$(jq -r '.llm_provider // empty' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
            echo "llm_model=$(jq -r '.llm_model // empty' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
            echo "agent_backend=$(jq -r '.agent_backend // empty' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: startsWith(vars.JOB_IMAGE_URL, 'ghcr.io/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch secrets from Doppler
        id: doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          # Fetch all secrets from Doppler at runtime — no keys stored in GitHub
          DOPPLER_SECRETS=$(curl -sf \
            "https://api.doppler.com/v3/configs/config/secrets/download?project=bigman-engine&config=prd&format=json" \
            -H "Authorization: Bearer $DOPPLER_TOKEN")

          if [ -z "$DOPPLER_SECRETS" ]; then
            echo "::error::Failed to fetch secrets from Doppler"
            exit 1
          fi

          # Build SECRETS JSON for the job container (PopeBot entrypoint parses this)
          SECRETS=$(echo "$DOPPLER_SECRETS" | jq -c '{
            ANTHROPIC_API_KEY: .ANTHROPIC_API_KEY,
            BRAVE_API_KEY: .BRAVE_API_KEY,
            GH_TOKEN: .GH_TOKEN,
            OBSIDIAN_API_KEY: .OBSIDIAN_API_KEY,
            OBSIDIAN_HOST: .OBSIDIAN_HOST,
            WEBHOOK_SECRET: .WEBHOOK_SECRET
          }')
          echo "SECRETS<<EOSECRETS" >> $GITHUB_ENV
          echo "$SECRETS" >> $GITHUB_ENV
          echo "EOSECRETS" >> $GITHUB_ENV

          # Export individual env vars — single jq pass for masking + export
          echo "$DOPPLER_SECRETS" | jq -r '
            to_entries[]
            | select(.key | test("^DOPPLER_") | not)
            | @text "\(.key)\t\(.value)"
          ' | while IFS=$'\t' read -r key val; do
            # Mask actual secrets (keys/tokens >20 chars), not config values
            if echo "$key" | grep -qiE 'KEY|SECRET|TOKEN' && [ ${#val} -gt 20 ]; then
              echo "::add-mask::$val"
            fi
            echo "$key<<EOF_$key" >> $GITHUB_ENV
            echo "$val" >> $GITHUB_ENV
            echo "EOF_$key" >> $GITHUB_ENV
          done

      - name: Run thepopebot Agent
        env:
          JOB_IMAGE_URL: ${{ vars.JOB_IMAGE_URL }}
          THEPOPEBOT_VERSION: ${{ steps.version.outputs.tag }}
          LLM_MODEL: ${{ steps.job-config.outputs.llm_model || vars.LLM_MODEL }}
          LLM_PROVIDER: ${{ steps.job-config.outputs.llm_provider || vars.LLM_PROVIDER }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          AGENT_BACKEND: ${{ steps.job-config.outputs.agent_backend || vars.AGENT_BACKEND || '' }}
        run: |
          AGENT_BACKEND="${AGENT_BACKEND:-pi}"
          if [ -n "$JOB_IMAGE_URL" ]; then
            IMAGE="${JOB_IMAGE_URL}:${THEPOPEBOT_VERSION}"
          elif [ "$AGENT_BACKEND" = "claude-code" ]; then
            IMAGE="stephengpope/thepopebot:claude-code-job-${THEPOPEBOT_VERSION}"
          else
            IMAGE="stephengpope/thepopebot:pi-coding-agent-job-${THEPOPEBOT_VERSION}"
          fi
          echo "Using image: $IMAGE"

          export LLM_SECRETS='{}'

          # The stock entrypoint unsets ANTHROPIC_API_KEY (designed for OAuth).
          # We use API key auth, so patch the entrypoint to keep it.
          docker run --rm \
            --entrypoint /bin/bash \
            -e REPO_URL="${{ github.server_url }}/${{ github.repository }}.git" \
            -e BRANCH="${{ github.ref_name }}" \
            -e SECRETS \
            -e LLM_SECRETS \
            -e LLM_MODEL="${LLM_MODEL}" \
            -e LLM_PROVIDER="${LLM_PROVIDER}" \
            -e OPENAI_BASE_URL="${OPENAI_BASE_URL}" \
            -e AGENT_BACKEND="${AGENT_BACKEND}" \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            -e BRAVE_API_KEY="${BRAVE_API_KEY}" \
            -e OBSIDIAN_API_KEY="${OBSIDIAN_API_KEY}" \
            -e OBSIDIAN_HOST="${OBSIDIAN_HOST}" \
            "$IMAGE" \
            -c 'cp /entrypoint.sh /tmp/entrypoint.sh && sed -i "/unset ANTHROPIC_API_KEY/d" /tmp/entrypoint.sh && exec /tmp/entrypoint.sh'

      - name: Sync outputs to Obsidian vault
        if: always()
        run: |
          # Find the commit with job outputs (before the cleanup commit)
          LOG_SHA=$(curl -sf \
            "https://api.github.com/repos/${{ github.repository }}/commits?sha=${{ github.ref_name }}&per_page=3" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" | \
            jq -r '[.[] | select(.commit.message | test("Agent Job"))] | .[0].sha // empty')

          if [ -z "$LOG_SHA" ]; then
            echo "No job output commit found, skipping vault sync"
            exit 0
          fi

          echo "Syncing job ${{ steps.job.outputs.id }} outputs to Obsidian vault..."

          # Use WEBHOOK_SECRET directly (already exported as individual env var)
          curl -s --connect-timeout 10 -X POST \
            "http://${{ vars.PUBLIC_HOST }}:${{ vars.VAULT_SYNC_PORT || '3005' }}/vault-sync" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $WEBHOOK_SECRET" \
            -d "{\"job_id\": \"${{ steps.job.outputs.id }}\", \"commit_sha\": \"$LOG_SHA\"}"
