services:
  event-handler:
    container_name: bigman-event-handler
    image: ${EVENT_HANDLER_IMAGE_URL:-stephengpope/thepopebot:event-handler-${THEPOPEBOT_VERSION:-1.2.74-beta.30}}
    ports:
      - "3004:80"
    environment:
      - AGENT_LLM_MODEL=${AGENT_LLM_MODEL}
      - AGENT_LLM_PROVIDER=${AGENT_LLM_PROVIDER}
      - AGENT_TYPE=${AGENT_TYPE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APP_HOSTNAME=${APP_HOSTNAME}
      - APP_PORT=${APP_PORT}
      - APP_URL=${APP_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GH_OWNER=${GH_OWNER}
      - GH_REPO=${GH_REPO}
      - GH_TOKEN=${GH_TOKEN}
      - OBSIDIAN_API_KEY=${OBSIDIAN_API_KEY}
      - OBSIDIAN_HOST=${OBSIDIAN_HOST}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - .:/project
      - ./config:/app/config
      - ./skills:/app/skills
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cron:/app/cron
      - ./triggers:/app/triggers
      - ./CLAUDE.md:/app/CLAUDE.md
      - ./SOUL.md:/app/SOUL.md
      - /var/run/docker.sock:/var/run/docker.sock
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
